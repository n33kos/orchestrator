# Work Source Configuration
# Define where the orchestrator discovers new work items.

sources:
  react-18-plan:
    type: markdown
    path: ~/Desktop/Plans/react-18-upgrade-plan.md
    polling: manual

  github-issues:
    type: github
    repo: owner/repo
    assignee: "@me"
    labels: agent/claude-code
    state: open
    limit: 20

  # Additional GitHub repos can be added:
  # design-system-issues:
  #   type: github
  #   repo: owner/design-system
  #   assignee: "@me"
  #   state: open

  # Jira source (requires jira CLI or API token):
  # team-board:
  #   type: jira
  #   board: CONSUMER
  #   filter: "assignee = currentUser() AND status != Done"
