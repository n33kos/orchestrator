# Work Source Configuration
# Define where the orchestrator discovers new work items.
#
# Source types:
#   markdown  — Parse a local markdown file for task items (checkboxes, numbered lists)
#   github    — Poll GitHub Issues using the gh CLI
#   jira      — Poll Jira issues (requires jira CLI or API token)
#
# Common options:
#   polling: manual | auto (default: auto for github/jira, manual for markdown)
#   limit: max items to return per poll (default: 20)

sources:
  # Example markdown source — point to a local plan file
  # my-plan:
  #   type: markdown
  #   path: ~/Desktop/Plans/my-upgrade-plan.md
  #   polling: manual

  # Example GitHub Issues source
  # github-issues:
  #   type: github
  #   repo: owner/repo
  #   assignee: "@me"
  #   labels: agent/claude-code
  #   state: open
  #   limit: 20

  # Example secondary repo
  # design-system-issues:
  #   type: github
  #   repo: owner/design-system
  #   assignee: "@me"
  #   state: open
  #   limit: 10

  # Jira source (requires JIRA_EMAIL and JIRA_API_TOKEN env vars):
  # team-board:
  #   type: jira
  #   domain: mycompany.atlassian.net
  #   board: CONSUMER
  #   filter: "project = CONSUMER AND assignee = currentUser() AND status != Done"
  #   limit: 20
