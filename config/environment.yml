# Orchestrator Environment Configuration
# All site-specific values that make the orchestrator portable.

# Identity
user:
  initials: me
  name: Your Name

# Repository
repo:
  path: ~/my-project
  worktree_prefix: ~/my-project-

# CLI Tools
tools:
  rostrum: /usr/local/bin/rostrum
  vmux: ~/.local/bin/vmux
  graphite: gt

# Orchestrator State
state:
  queue_file: ~/.claude/orchestrator/queue.json
  profile_file: ~/.claude/orchestrator/profile.md

# Concurrency
concurrency:
  max_active_projects: 2
  quick_fix_limit: 4
  queue_strategy: priority

# Autonomy
autonomy:
  auto_activate: true
  auto_approve_plans: false
  require_approved_plan: true
  ask_before_teardown: true

# Plans
plans:
  plans_directory: ~/.claude/orchestrator/plans

# Delegator
delegator:
  enabled_by_default: true
  training_mode: true
  communication: text
  cycle_interval: 900  # seconds between monitoring cycle triggers

# Branch Naming
branches:
  pattern: "{initials}/{domain}/{project}/{position}/{description}"

# Dashboard (API runs inline via Vite dev server middleware)
dashboard:
  port: 3201
  api_port: 3201

# Scheduler
scheduler:
  poll_interval: 120
  cleanup_every: 10  # cycles between cleanup runs
  archive_after_days: 7

# Stall Detection
stall_detection:
  threshold_minutes: 30
