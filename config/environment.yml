# Orchestrator Environment Configuration
# All site-specific values that make the orchestrator portable.

# Identity
user:
  initials: me
  name: Your Name

# CLI Tools
tools:
  vmux: ~/.local/bin/vmux
  graphite: gt

# Per-Repository Configuration
# Each repo entry defines its path, worktree settings, and commit strategy.
# Items in the queue reference a repo by key (e.g., repo_key: "my-project").
# The _defaults entry provides fallback values for unconfigured repos.
# Per-item overrides in queue.json still take precedence over repo config.
#
# Available settings per repo:
#   path            — Filesystem path to the repo
#   worktree_prefix — Path prefix for worktree directories
#   commit_strategy — branch_and_pr | graphite_stack | commit_to_main
#   use_worktree    — Whether to create worktrees for this repo (true/false)
#   branching_pattern — Branch naming convention with {initials}, {domain}, etc.
#   worktree.setup       — Command template for creating a worktree
#   worktree.setup_quick — Command template for quick worktree creation
#   worktree.teardown    — Command template for removing a worktree
#   worktree.list        — Command template for listing worktrees
#   worktree.dev         — Command to start dev server in a worktree
#
# Template variables available in worktree commands:
#   {branch}, {path}, {repo_path}

repositories:
  _defaults:
    path: ~/my-project
    worktree_prefix: ~/my-project-
    commit_strategy: branch_and_pr
    use_worktree: true
    branching_pattern: "{initials}/{domain}/{project}/{position}/{description}"
    worktree:
      setup: "git worktree add -b {branch} {path} main"
      setup_quick: "git worktree add -b {branch} {path} main"
      teardown: "git worktree remove {path}"
      list: "git worktree list --porcelain"
      dev: ""

# Orchestrator State
state:
  queue_file: ~/.claude/orchestrator/queue.json

# Concurrency
concurrency:
  max_active: 2
  queue_strategy: priority

# Autonomy
autonomy:
  auto_activate: true
  auto_approve_plans: false
  require_approved_plan: true
  ask_before_teardown: true

# Artifacts (plans, reports, and other generated files)
artifacts:
  artifacts_directory: ~/.claude/orchestrator/plans

# Delegator
delegator:
  enabled_by_default: true
  communication: text
  cycle_interval: 900  # seconds between monitoring cycle triggers
  default_model: haiku
  review_model: opus
  transcript_lines_triage: 100
  transcript_lines_deep: 500

# Dashboard (API runs inline via Vite dev server middleware)
dashboard:
  port: 3201
  api_port: 3201

# Scheduler
scheduler:
  poll_interval: 120
  cleanup_every: 10  # cycles between cleanup runs
  archive_after_days: 7

# Delegator Directives
# Per-status instructions that the delegator evaluates during its monitoring cycle.
# Directives are loaded from delegator/directives/<status>/*.md files.
# Each file has YAML frontmatter (name, required, max_retries) and a markdown body.
# Directives from environment.local.yml are merged (same-name replaces, new names appended).
#
# Available fields per directive:
#   name         — Unique identifier for this directive
#   instructions — Natural language instructions for the delegator (from markdown body)
#   required     — If true, must pass/complete before the item can transition to the next status
#   max_retries  — Maximum times to retry if required and failing (0 = unlimited)
directives:
  active: []
  review: []

# Stall Detection
stall_detection:
  threshold_minutes: 30
